<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="bg-orb orb-one"></div>
    <div class="bg-orb orb-two"></div>

    <main class="game-shell">
        <div class="result-emoji" id="resultEmoji" aria-hidden="true">😄</div>

        <header class="hero">
            <p class="eyebrow">Best of pure luck + quick reflexes</p>
            <h1>Rock Paper Scissors</h1>
            <p class="subtitle">Choose your move and outsmart the computer.</p>
        </header>

        <section class="choices" aria-label="Game choices">
            <button class="choice" id="rock" aria-label="Choose rock">
                <img src="image/rock.png" alt="Rock">
                <span>Rock</span>
            </button>

            <button class="choice" id="paper" aria-label="Choose paper">
                <img src="image/paper.png" alt="Paper">
                <span>Paper</span>
            </button>

            <button class="choice" id="scissor" aria-label="Choose scissor">
                <img src="image/scissor.png" alt="Scissor">
                <span>Scissor</span>
            </button>
        </section>

        <section class="score-board" aria-label="Score board">
            <div class="score">
                <p id="user-score">0</p>
                <p>You</p>
            </div>
            <div class="score-divider">vs</div>
            <div class="score">
                <p id="computer-score">0</p>
                <p>Computer</p>
            </div>
        </section>

        <section class="status-row">
            <p id="msg">Make your move</p>
            <button id="reset-btn" type="button">Reset</button>
        </section>

        <section class="round-info" aria-live="polite">
            <p id="round-detail">First to bragging rights. Let's go.</p>
        </section>
    </main>

    <script src="first.js"></script>
</body>

</html>
